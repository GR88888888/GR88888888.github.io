<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typewriter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; min-height: 100vh; padding: 3rem 4rem; }
  #output {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 18px;
    color: #e8e8e8;
    line-height: 2;
    white-space: pre-wrap;
  }
  #output .pink { color: #f0b8d0; }
  .cursor {
    display: inline-block;
    width: 2px; height: 1em;
    background: #f0b8d0;
    margin-left: 1px;
    vertical-align: middle;
    animation: blink 0.7s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>
<div id="output"><span class="cursor"></span></div>
<script>
const segments = [
  { text: "Hello!\n", pink: true },
  { text: "I am your AI Mentor and product manager.\n", pink: false },
  { text: "How can I help?", pink: false },
];

const chars = [];
segments.forEach(seg => {
  for (const ch of seg.text) chars.push({ ch, pink: seg.pink });
});

const output = document.getElementById('output');
let index = 0;
let currentSpan = null;
let currentPink = null;

function randDelay(ch) {
  if (ch === '\n') return 80 + Math.random() * 60;
  if (ch === ' ') return 20 + Math.random() * 25;
  if (ch === ',' || ch === '.' || ch === '!') return 60 + Math.random() * 50;
  return 28 + Math.random() * 32;
}

function type() {
  if (index >= chars.length) return;
  const { ch, pink } = chars[index++];

  const cur = output.querySelector('.cursor');
  if (cur) cur.remove();

  if (ch === '\n') {
    currentSpan = null;
    currentPink = null;
    output.appendChild(document.createTextNode('\n'));
  } else {
    if (pink !== currentPink || !currentSpan) {
      currentSpan = document.createElement('span');
      if (pink) currentSpan.className = 'pink';
      output.appendChild(currentSpan);
      currentPink = pink;
    }
    currentSpan.textContent += ch;
  }

  const newCur = document.createElement('span');
  newCur.className = 'cursor';
  output.appendChild(newCur);

  setTimeout(type, randDelay(ch));
}

type();
</script>
</body>
</html>
